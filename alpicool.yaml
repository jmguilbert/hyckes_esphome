substitutions:
  name: alpicool-fridge
  friendly_name: "Alpicool Fridge"
  # Replace with your fridge's BLE MAC address
  # Look for devices named A1-*, AK1-*, AK2-*, or AK3-*
  fridge_mac: "XX:XX:XX:XX:XX:XX"
  # MQTT topic prefix (used when MQTT is enabled)
  mqtt_topic: "alpicool"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name} Fallback"
    password: !secret ap_password

captive_portal:


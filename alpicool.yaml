external_components:
  - source:
      type: git
      url: https://github.com/jmguilbert/hyckes_esphome
      ref: master
    components: [alpicool]

esp32_ble_tracker:
  scan_parameters:
    interval: 1000ms
    window: 500ms
    active: true

ble_client:
  - mac_address: ${fridge_mac}
    id: alpicool_ble

alpicool:
  id: alpicool_device
  ble_client_id: alpicool_ble
  update_interval: 2s

sensor:
  - platform: alpicool
    alpicool_id: alpicool_device
    current_temperature:
      name: "Current Temperature"
      id: alpicool_current_temp
    target_temperature:
      name: "Target Temperature"
      id: alpicool_target_temp
    input_voltage:
      name: "Input Voltage"
      id: alpicool_voltage
    # Dual-zone only (ignored if single-zone fridge)
    right_current_temperature:
      name: "Right Current Temperature"
      id: alpicool_right_current_temp
    right_target_temperature:
      name: "Right Target Temperature"
      id: alpicool_right_target_temp

binary_sensor:
  - platform: alpicool
    alpicool_id: alpicool_device
    connected:
      name: "Connected"
      id: alpicool_connected
    # Dual-zone only (compressor running status)
    running:
      name: "Compressor Running"
      id: alpicool_running

switch:
  - platform: alpicool
    alpicool_id: alpicool_device
    power:
      name: "Power"
      id: alpicool_power
    eco_mode:
      name: "Eco Mode"
      id: alpicool_eco

number:
  - platform: alpicool
    alpicool_id: alpicool_device
    target_temperature:
      name: "Set Temperature"
      id: alpicool_set_temp
    # Dual-zone only
    right_target_temperature:
      name: "Set Right Temperature"
      id: alpicool_set_right_temp
